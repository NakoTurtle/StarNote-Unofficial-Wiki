name: Update StarNote Wiki
on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    # Optional: Force Node 24 for all steps right now
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6 # Updated to v6

      - name: Set up Python
        uses: actions/setup-python@v6 # Updated to v6
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests mkdocs-material

      - name: Run Reddit Scraper
        run: python scripts/fetch_reddit.py

      - name: Commit Updated Features
        run: |
          git config --global user.name 'StarNote-Wiki-Bot'
          git config --global user.email 'actions@github.com'
          git add docs/features.md
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-update: Latest Reddit Metrics" && git push)

      - name: Deploy MkDocs to GitHub Pages
        run: mkdocs gh-deploy --force

name: Update StarNote Wiki
on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests mkdocs-material

      - name: Run Reddit Scraper
        run: python scripts/fetch_reddit.py

      - name: Deploy MkDocs to GitHub Pages
        # This command is smart. It takes the docs folder (including the 
        # features.md your script just made) and pushes it to a HIDDEN 
        # branch called 'gh-pages' which powers your website.
        run: mkdocs gh-deploy --force

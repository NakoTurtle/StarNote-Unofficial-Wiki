name: Update StarNote Wiki
on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    # Optional: Opt into Node 24 now to test stability
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6 # Updated to v6 for Node 24 support

      - name: Set up Python
        uses: actions/setup-python@v6 # Updated to v6 for Node 24 support
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests mkdocs-material

      - name: Run Reddit Scraper
        run: python scripts/fetch_reddit.py

      - name: Commit and Push Data Artifacts
        run: |
          git config --global user.name 'StarNote-Wiki-Bot'
          git config --global user.email 'actions@github.com'
          
          # 1. Force the bot to sync its timeline with yours
          git fetch origin main
          git reset --mixed origin/main
          
          # 2. Re-stage the files the Python script just created
          git add docs/features.md data/cleaned_feature_data.csv
          
          # 3. Only commit if there are actually new changes
          if ! git diff --cached --quiet; then
            git commit -m "Auto-update: Syncing manual JSON drop"
            # 4. Use --rebase to ensure a clean push
            git pull --rebase origin main
            git push origin main
          else
            echo "No changes detected. skipping."
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Deploy MkDocs to GitHub Pages
        run: mkdocs gh-deploy --force

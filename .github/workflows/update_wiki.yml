name: Update StarNote Wiki
on:
  schedule:
    - cron: '0 0 * * *' # Runs every night at midnight
  workflow_dispatch:      # Allows you to click a button to run it manually

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests mkdocs-material

      - name: Run Reddit Scraper
        run: python scripts/fetch_reddit.py

      - name: Commit Updated Features
        run: |
          git config --global user.name 'StarNote-Wiki-Bot'
          git config --global user.email 'actions@github.com'
          git add docs/features.md
          # Only commit if the file actually changed to avoid empty commits
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-update: Latest Reddit Metrics" && git push)

      - name: Deploy MkDocs to GitHub Pages
        run: mkdocs gh-deploy --force

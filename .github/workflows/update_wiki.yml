name: Update StarNote Wiki
on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:
  push:
    paths:
      - 'data/raw_json/**'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Crucial for the 'git push' to work
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Fetches all history so rebase works correctly

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests mkdocs-material

      - name: Run Reddit Scraper
        run: python scripts/fetch_reddit.py

      - name: Commit and Push Results
        run: |
          git config --global user.name 'StarNote-Wiki-Bot'
          git config --global user.email 'actions@github.com'
          
          # Add all generated files
          git add docs/features.md data/cleaned_feature_data.csv
          
          # Only commit if something actually changed
          if ! git diff --cached --quiet; then
            git commit -m "Auto-update: Synced manual JSON drop and audit"
            
            # The Magic Fix: Pull the latest changes (your JSON) 
            # and put the bot's work on top.
            git pull --rebase origin main
            
            git push origin main
          else
            echo "No changes detected. Skipping commit."
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Deploy Wiki Website
        run: mkdocs gh-deploy --force

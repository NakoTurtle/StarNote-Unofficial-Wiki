name: Update StarNote Wiki
on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:
  push:
    paths:
      - 'data/raw_json/**' # Trigger automatically when you drop a new JSON file

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests mkdocs-material

      - name: Run Reddit Scraper
        # This creates features.md and most_wanted.md in the runner's memory
        run: python scripts/fetch_reddit.py

      - name: Deploy Wiki Website
        # mkdocs takes the files the script just made and pushes them 
        # to the live site branch (gh-pages) automatically.
        run: mkdocs gh-deploy --force

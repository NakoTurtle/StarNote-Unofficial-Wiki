name: Update StarNote Wiki
on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    # Optional: Opt into Node 24 now to test stability
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6 # Updated to v6 for Node 24 support

      - name: Set up Python
        uses: actions/setup-python@v6 # Updated to v6 for Node 24 support
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests mkdocs-material

      - name: Run Reddit Scraper
        run: python scripts/fetch_reddit.py

      - name: Deploy MkDocs to GitHub Pages
        run: |
          # We skip the 'git commit' and 'git push' entirely to avoid the error.
          # mkdocs gh-deploy handles its own internal git logic for the website.
          mkdocs gh-deploy --force

      - name: Deploy MkDocs to GitHub Pages
        run: mkdocs gh-deploy --force

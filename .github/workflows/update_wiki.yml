name: Update StarNote Wiki
on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    # Optional: Opt into Node 24 now to test stability
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6 # Updated to v6 for Node 24 support

      - name: Set up Python
        uses: actions/setup-python@v6 # Updated to v6 for Node 24 support
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests mkdocs-material

      - name: Run Reddit Scraper
        run: python scripts/fetch_reddit.py

      - name: Commit and Push Data Artifacts
        run: |
          git config --global user.name 'StarNote-Wiki-Bot'
          git config --global user.email 'actions@github.com'
          
          # Stage the new CSV and the updated markdown files
          git add docs/features.md docs/most_wanted.md data/cleaned_feature_data.csv
          
          # Check if there are any staged changes to commit
          if ! git diff --cached --quiet; then
            git commit -m "Auto-update: Audit results and CSV artifact"
            git push
          else
            echo "No changes detected in data or docs. Skipping commit."
          fi

      - name: Deploy MkDocs to GitHub Pages
        run: mkdocs gh-deploy --force

name: Live Roadmap Sync

on:
  schedule:
    - cron: '0 2 * * *' # Runs automatically every night at 2:00 AM
  workflow_dispatch: # Allows you to manually click a button to force an instant update

permissions:
  contents: write # Essential to give the bot permission to push the file back to your repo

jobs:
  sync-and-save:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Fetch and Filter Columns
        run: |
          pip install pandas
          python -c "
          import pandas as pd
          import os
          
          # Force create the directory structure if it's missing
          os.makedirs('docs', exist_ok=True)
          
          url = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQtiBakTflkiKuB5evW4VyLPjx6AVuchwgVEPd8dHXpXNtOuEXyXH7kf5kXxx_v-BkwpvpU8m3aDFta/pub?gid=0&single=true&output=csv'
          df = pd.read_csv(url)
          
          # 1. Clean column names to strip out accidental trailing spaces
          df.columns = df.columns.str.strip()
          
          # 2. Convert Priority Score to numeric so it sorts mathematically, not alphabetically
          # (Assuming your column header is named 'Priority Score')
          df['Priority Score'] = pd.to_numeric(df['Priority Score'], errors='coerce')
          
          # 3. Sort by Priority Score in descending order (highest score at the top)
          df = df.sort_values(by='Priority Score', ascending=False)
          
          # 4. Define the exact public columns you want to display on the wiki
          public_columns = ['Feature Request', 'Category', 'Status', 'Workaround(s)']
          filtered_df = df[public_columns]
          
          # 5. Save the perfectly ordered table straight to your docs folder
          filtered_df.to_csv('docs/roadmap.csv', index=False)
          "

      - name: Commit and Push CSV Back to Repository
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          git add docs/roadmap.csv
          
          # Only commit if changes actually exist to avoid empty commit pipeline breaks
          git diff-index --quiet HEAD || git commit -m "Automated update of public feature backlog"
          git push

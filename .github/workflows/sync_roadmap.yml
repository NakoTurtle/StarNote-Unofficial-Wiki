name: Live Roadmap Sync

on:
  schedule:
    - cron: '0 2 * * *' # Runs automatically every night at 2:00 AM
  workflow_dispatch: # Allows you to manually click a button to force an instant update

permissions:
  contents: write # Essential to give the bot permission to push the file back to your repo

jobs:
  sync-and-save:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Fetch and Filter Columns
        run: |
          pip install pandas
          python -c "
          import pandas as pd
          import os
          
          # Force create the directory structure if it's missing in the container
          os.makedirs('docs', exist_ok=True)
          
          url = 'PASTE_YOUR_COPIED_GOOGLE_SHEETS_CSV_LINK_HERE'
          df = pd.read_csv(url)
          
          # Strips out internal data, grabbing the exact public columns
          public_columns = ['Feature Request', 'Request Platform(s)', 'Category', 'Status', 'Update Implemented']
          filtered_df = df[public_columns]
          
          # Saves it locally to your docs folder
          filtered_df.to_csv('docs/roadmap.csv', index=False)
          "

      - name: Commit and Push CSV Back to Repository
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          git add docs/roadmap.csv
          
          # Only commit if changes actually exist to avoid empty commit pipeline breaks
          git diff-index --quiet HEAD || git commit -m "Automated update of public feature backlog"
          git push

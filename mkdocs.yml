site_name: StarNote Unofficial Wiki
theme:
  logo: assets/sparkle-fill-24.svg
  favicon: assets/sparkle-fill-24.svg
  #assets/StarNote Unofficial.svg
  name: material
  palette:
  
    # Palette toggle for automatic mode
    - media: "(prefers-color-scheme)"
      toggle:
        icon: material/brightness-auto
        name: Switch to light mode

    # Palette toggle for light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      toggle:
        icon: material/weather-sunny
        name: Switch to dark mode

    # Palette toggle for dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      toggle:
        icon: material/weather-night
        name: Switch to pure black
    
    # Palette toggle for dark mode
    #-   scheme: starnote-black
    #    toggle:
    #      icon: material/circle
    #      name: Switch to system preference
  features:
    - navigation.path
    - navigation.sections
    - navigation.top
    - search.highlight
    - search.share
extra_css:
  - stylesheets/extra.css
plugins:
- search
nav:
  - Introduction: index.md
  - Tools & Toolbar: tools.md
  #- Other Tools: other-tools.md
markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - attr_list
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg




















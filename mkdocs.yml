site_name: StarNote Unofficial Wiki
theme:
  icon:
    annotation: simple/android
  logo: assets/sparkle-fill-24.svg
  favicon: assets/sparkle-fill-24.svg
  #assets/StarNote Unofficial.svg
  name: material
  palette:
  
    # Palette toggle for automatic mode
    - media: "(prefers-color-scheme)"
      toggle:
        icon: material/brightness-auto
        name: Switch to light mode

    # Palette toggle for light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      toggle:
        icon: material/weather-sunny
        name: Switch to dark mode

    # Palette toggle for dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      toggle:
        icon: material/weather-night
        name: Switch to pure black
    
    # Palette toggle for dark mode
    #-   scheme: starnote-black
    #    toggle:
    #      icon: material/circle
    #      name: Switch to system preference
  features:
    - navigation.path
    - navigation.sections
    - navigation.top
    - search.highlight
    - search.share
    - content.code.copy
    - content.tooltips
    - navigation.instant
    - navigation.preview
extra_css:
  - stylesheets/extra.css
plugins:
- search
- markmap
nav:
  - Home: index.md
  - Getting Started:
      - Quick Start: setup.md
      - FAQ: faq.md
  - Study Toolkit (PDFs):
      - Importing Documents: pdf_import.md
      - Annotation & Expansion: pdf_tools.md
      - Smart Inversion (Dark Mode): dark_mode.md
      - Exporting Notes: pdf_export.md
  - Creation Tools:
      - Pen & Writing: pens.md
      - Smart Tables: tables.md
      - Shapes & Geometry: shapes.md
  - Workspace Editing:
      - Lasso & Selection: lasso.md
      - Canvas Backgrounds: templates.md
  - Management:
      - Cloud Backup & Sync: sync.md
      - Local File Backups: backups.md
  - Community Data:
      - Feature Tracker: features.md
      - Most Wanted: most_wanted.md
  - Technical:
      - Hardware Guide: hardware.md
      - Known Limitations: limitations.md
markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - attr_list
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - md_in_html
  - pymdownx.tabbed:
      alternate_style: true
  - toc:
      toc_depth: 2
extra_javascript:
  - javascripts/markmap-force-dark.js
extra:
  generator: false

 


















